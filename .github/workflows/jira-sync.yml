name: Jira Status Sync

on:
  push:
    branches-ignore:
      - main

  pull_request:
    types: [opened, reopened, synchronize, edited, closed]

jobs:
  jira-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Extract Jira Issue Key Flexibly
        id: extract
        shell: bash
        run: |
          ISSUE=$(python3 <<'PY'
          import json
          import os
          import re

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          event_path = os.environ.get("GITHUB_EVENT_PATH", "")

          with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)

          texts = []

          # Always scan branch/ref name
          texts.append(os.environ.get("GITHUB_REF_NAME", ""))

          if event_name == "push":
              head_commit = event.get("head_commit") or {}
              texts.append(head_commit.get("message") or "")

              for commit in event.get("commits", []):
                  texts.append(commit.get("message") or "")

          if event_name == "pull_request":
              pr = event.get("pull_request") or {}

              texts.append(pr.get("title") or "")
              texts.append(pr.get("body") or "")

              head = pr.get("head") or {}
              base = pr.get("base") or {}

              texts.append(head.get("ref") or "")
              texts.append(base.get("ref") or "")

          combined_text = " ".join(texts)

          # Accepts FIXBEE-57, fixbee-57, FIXBEE_57, fixbee 57, FIXBEE57
          match = re.search(r"\bFIXBEE[\s_-]*(\d+)\b", combined_text, re.IGNORECASE)

          if match:
              print(f"FIXBEE-{match.group(1)}")
          else:
              print("")
          PY
          )

          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
          echo "Found Jira issue: $ISSUE"

      - name: Stop if no Jira key found
        if: steps.extract.outputs.issue == ''
        run: |
          echo "No Jira issue key found."
          echo "Add FIXBEE-57 somewhere in the branch, commit, PR title, or PR description."
          exit 0

      - name: Get current Jira status
        if: steps.extract.outputs.issue != ''
        id: jira_status
        shell: bash
        run: |
          RESPONSE=$(curl --silent --show-error \
            --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue }}" \
            --user "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            --header "Accept: application/json")

          STATUS=$(echo "$RESPONSE" | python3 -c 'import sys, json; print(json.load(sys.stdin)["fields"]["status"]["name"])')
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Current Jira status: $STATUS"

      - name: Move ticket to In Progress
        if: >
          github.event_name == 'push' &&
          steps.extract.outputs.issue != '' &&
          steps.jira_status.outputs.status != 'Done' &&
          steps.jira_status.outputs.status != 'In Review' &&
          steps.jira_status.outputs.status != 'In Progress'
        run: |
          curl --request POST \
            --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue }}/transitions" \
            --user "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data "{\"transition\":{\"id\":\"${{ secrets.JIRA_IN_PROGRESS_ID }}\"}}"

      - name: Move ticket to In Review
        if: >
          github.event_name == 'pull_request' &&
          (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize' || github.event.action == 'edited') &&
          steps.extract.outputs.issue != '' &&
          steps.jira_status.outputs.status != 'Done' &&
          steps.jira_status.outputs.status != 'In Review'
        run: |
          curl --request POST \
            --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue }}/transitions" \
            --user "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data "{\"transition\":{\"id\":\"${{ secrets.JIRA_REVIEW_ID }}\"}}"

      - name: Move ticket to Done
        if: >
          github.event_name == 'pull_request' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true &&
          steps.extract.outputs.issue != '' &&
          steps.jira_status.outputs.status != 'Done'
        run: |
          curl --request POST \
            --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract.outputs.issue }}/transitions" \
            --user "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data "{\"transition\":{\"id\":\"${{ secrets.JIRA_DONE_ID }}\"}}"
